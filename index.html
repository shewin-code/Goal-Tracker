<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Momentum">
<title>Momentum</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0f0f0;--text2:#888;--text3:#555;--green:#b8f0a0;--green-bg:rgba(184,240,160,0.08);--green-border:rgba(184,240,160,0.2);--blue:#a0c8f0;--blue-bg:rgba(160,200,240,0.08);--blue-border:rgba(160,200,240,0.2);--amber:#f0d0a0;--amber-bg:rgba(240,208,160,0.08);--amber-border:rgba(240,208,160,0.2);--purple:#c0a0f0;--purple-bg:rgba(192,160,240,0.08);--purple-border:rgba(192,160,240,0.2);--red:#f0a0a0;--red-bg:rgba(240,160,160,0.08);--red-border:rgba(240,160,160,0.2);--radius:10px;--radius-lg:14px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100dvh;overscroll-behavior:none}
.page{display:none;max-width:480px;margin:0 auto;padding:0 0 calc(72px + var(--safe-bottom)) 0}
.page.active{display:block}
.header{padding:calc(var(--safe-top) + 20px) 20px 16px;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.app-title,.page-title{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase}
.streak-row{display:flex;gap:6px}
.streak-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.streak-dot.active{background:var(--green)}
.day-tabs{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;background:none;color:var(--text3)}
.day-tab .tab-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.05em;text-transform:uppercase}
.day-tab .tab-dot{width:5px;height:5px;border-radius:50%;background:transparent}
.day-tab.has-gym .tab-dot{background:var(--blue);opacity:0.5}
.day-tab.today .tab-label{color:var(--text)}
.day-tab.active{background:var(--surface);border-color:var(--border2);color:var(--text)}
.day-tab.active.has-gym .tab-dot{opacity:1}
.progress-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.progress-day{font-size:17px;font-weight:500}
.progress-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)}
.progress-track{height:3px;background:var(--surface2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.content{padding:16px 20px 0}
.gym-card{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:20px}
.gym-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gym-card-title{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--blue)}
.gym-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);background:rgba(160,200,240,0.12);padding:3px 8px;border-radius:99px}
.gym-exercise{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.gym-exercise:last-child{border-bottom:none;padding-bottom:0}
.gym-ex-name{font-size:13px;color:var(--text)}
.gym-ex-sets{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;margin-top:16px}
.habit-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);margin-bottom:6px;cursor:pointer;transition:all 0.12s;user-select:none;-webkit-user-select:none}
.habit-row:active{transform:scale(0.985)}
.habit-row.done{border-color:var(--green-border);background:var(--green-bg)}
.habit-row.done .habit-label{color:var(--text2);text-decoration:line-through;text-decoration-color:var(--text3)}
.check-box{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:1px}
.habit-row.done .check-box{background:var(--green);border-color:var(--green)}
.check-icon{width:10px;height:10px;opacity:0;transition:opacity 0.15s}
.habit-row.done .check-icon{opacity:1}
.habit-body{flex:1}
.habit-label{font-size:14px;color:var(--text);line-height:1.4;transition:color 0.2s}
.habit-sub{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5}
.habit-tag{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:99px;flex-shrink:0;margin-top:2px}
.tag-food{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.tag-skin{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.tag-hair{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.tag-rest{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.tag-activity{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.tag-gym{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.day-note{margin-top:16px;padding:12px 14px;border-radius:var(--radius);border-left:2px solid var(--green-border);background:var(--green-bg);font-size:13px;color:var(--text2);line-height:1.6}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:8px 8px calc(var(--safe-bottom) + 8px);background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;z-index:10}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;border-radius:var(--radius);border:none;background:none;color:var(--text3);cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.05em;transition:all 0.15s;flex:1}
.nav-btn.active{color:var(--text);background:var(--surface)}
.nav-btn svg{width:20px;height:20px}
.section-content{padding:16px 20px 0}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:500;color:var(--text)}
.stat-sub{font-size:12px;color:var(--text2);margin-top:2px}
.log-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.log-card-title{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:14px}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.styled-input{box-sizing:border-box;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:15px;flex:1;min-width:0}
.styled-input:focus{outline:none;border-color:var(--green)}
.unit-label{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);flex-shrink:0}
.save-btn{padding:10px 18px;border-radius:var(--radius);border:1px solid var(--green-border);background:var(--green-bg);color:var(--green);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;flex-shrink:0}
.save-btn:active{transform:scale(0.97)}
.chart-wrap{position:relative;height:160px;margin-bottom:8px}
.chart-empty{height:160px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);text-align:center;padding:0 20px}
.history-list{margin-top:10px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-item:last-child{border-bottom:none}
.history-date{color:var(--text2);font-family:'DM Mono',monospace;font-size:12px}
.history-val{color:var(--text);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px}
.history-delta{font-size:11px;font-family:'DM Mono',monospace}
.delta-down{color:var(--green)}
.delta-up{color:var(--red)}
.muscle-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.muscle-tabs::-webkit-scrollbar{display:none}
.muscle-tab{padding:6px 14px;border-radius:99px;border:1px solid var(--border2);font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;background:none;flex-shrink:0}
.muscle-tab.active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.exercise-log-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
.ex-log-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px}
.prev-best{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px}
.set-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.set-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);width:30px;flex-shrink:0}
.set-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;text-align:center;width:72px}
.set-input:focus{outline:none;border-color:var(--blue)}
.set-x{color:var(--text3);font-family:'DM Mono',monospace;font-size:13px}
.remove-set-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--red-border);background:none;color:var(--red);font-size:16px;line-height:1;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-left:auto}
.remove-set-btn:active{transform:scale(0.9)}
.set-btn-row{display:flex;gap:8px;margin-top:6px}
.add-set-btn{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);background:none;border:1px dashed var(--blue-border);border-radius:var(--radius);padding:6px 12px;cursor:pointer;flex:1}
.log-session-btn{width:100%;padding:12px;border-radius:var(--radius);border:1px solid var(--green-border);background:var(--green-bg);color:var(--green);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.05em;cursor:pointer;margin-top:8px}
.log-session-btn:active{transform:scale(0.98)}
.ex-chart-wrap{position:relative;height:110px;margin-top:12px}
.ex-chart-empty{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-top:8px;padding-top:4px}
.ex-chart-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:10px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.07em}
.muscle-tab-today{border-color:var(--blue-border);color:var(--blue)}
.gym-info-banner{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:16px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.6}

/* Week page */
.week-day-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.week-day-row:last-child{border-bottom:none}
.week-day-name{font-size:13px;color:var(--text);min-width:36px}
.week-day-type{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);min-width:44px}
.week-day-bar{flex:1;margin:0 12px;height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}
.week-day-fill{height:100%;background:var(--green);border-radius:99px}
.week-day-pct{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);min-width:32px;text-align:right}

/* Streak cards */
.streak-card{border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.streak-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.streak-card-title{font-size:14px;font-weight:500;color:var(--text)}
.streak-number{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;line-height:1}
.streak-unit{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);margin-top:2px}
.streak-dots-row{display:flex;gap:4px;margin:10px 0}
.s-dot{width:10px;height:10px;border-radius:50%;background:var(--surface2);flex-shrink:0}
.s-dot.hit{background:var(--green)}
.streak-milestone{margin-top:10px;padding:10px 12px;border-radius:var(--radius);font-size:12px;line-height:1.6}
.milestone-now{background:var(--surface2);border-left:2px solid var(--text3);color:var(--text2)}
.milestone-next{border-left:2px solid;padding-left:10px;margin-top:6px;font-size:12px;line-height:1.6}

/* Colour variants per streak category */
.sc-sleep .streak-number{color:var(--purple)}
.sc-sleep .s-dot.hit{background:var(--purple)}
.sc-sleep .milestone-next{border-color:var(--purple-border);background:var(--purple-bg);color:var(--text2)}
.sc-skin .streak-number{color:var(--amber)}
.sc-skin .s-dot.hit{background:var(--amber)}
.sc-skin .milestone-next{border-color:var(--amber-border);background:var(--amber-bg);color:var(--text2)}
.sc-hair .streak-number{color:var(--purple)}
.sc-hair .s-dot.hit{background:var(--purple)}
.sc-hair .milestone-next{border-color:var(--purple-border);background:var(--purple-bg);color:var(--text2)}
.sc-gym .streak-number{color:var(--blue)}
.sc-gym .s-dot.hit{background:var(--blue)}
.sc-gym .milestone-next{border-color:var(--blue-border);background:var(--blue-bg);color:var(--text2)}
.sc-walk .streak-number{color:var(--green)}
.sc-walk .s-dot.hit{background:var(--green)}
.sc-walk .milestone-next{border-color:var(--green-border);background:var(--green-bg);color:var(--text2)}
.sc-nutrition .streak-number{color:var(--green)}
.sc-nutrition .s-dot.hit{background:var(--green)}
.sc-nutrition .milestone-next{border-color:var(--green-border);background:var(--green-bg);color:var(--text2)}

/* Stat bars (Stats page) */
.stat-bar-row{margin-bottom:16px}
.stat-bar-top{display:flex;align-items:baseline;justify-content:space-between}
.stat-bar-name{font-size:14px;color:var(--text)}
.stat-bar-lvl{font-family:'DM Mono',monospace;font-size:11px}
.stat-bar-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin:2px 0 7px}
.stat-bar-track{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:99px;transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.stat-bar-xp{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:5px;text-align:right}

/* Goals page */
.new-goal-btn{width:100%;padding:12px;border-radius:var(--radius);border:1px dashed var(--border2);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.04em;cursor:pointer;margin-bottom:16px}
.new-goal-btn:active{transform:scale(0.99)}
.goal-form-wrap{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:16px;margin-bottom:18px}
.gf-type-row{display:flex;gap:6px;margin-bottom:10px}
.gf-type-btn{flex:1;padding:8px 0;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer}
.gf-type-btn.active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.gf-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);line-height:1.6;margin-bottom:10px}
.gf-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:7px}
.gf-stat-row,.gf-step-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.gf-select{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px}
.gf-select:focus{outline:none;border-color:var(--green)}
.gf-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.gf-cancel{padding:10px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:none;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer}
.gf-err{color:var(--red);font-family:'DM Mono',monospace;font-size:11px;margin-top:8px;min-height:14px}
.goals-empty{font-size:13px;color:var(--text2);line-height:1.7;padding:18px 16px;border:1px dashed var(--border2);border-radius:var(--radius-lg);background:var(--surface)}
.goal-card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--text3);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:14px 16px;margin-bottom:12px}
.goal-card.slim{padding:12px 16px}
.goal-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.goal-title{font-size:15px;font-weight:500;color:var(--text);line-height:1.35}
.goal-del{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:0 0 0 6px;flex-shrink:0;line-height:1}
.goal-del:active{color:var(--red)}
.goal-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.reward-pill{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:99px;border:1px solid;background:transparent}
.freq-pill{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:99px;border:1px solid var(--border2);color:var(--text2)}
.goal-progress-line{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);margin-top:10px}
.goal-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:8px}
.goal-step{display:flex;align-items:flex-start;gap:11px;padding:9px 0;cursor:pointer;border-top:1px solid rgba(255,255,255,0.04)}
.goal-step:first-of-type{border-top:none}
.goal-step-text{font-size:13px;color:var(--text);line-height:1.4;padding-top:1px}
.goal-step.done .goal-step-text{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3)}
.goal-step.done .check-box{background:var(--green);border-color:var(--green)}
.goal-step.done .check-icon{opacity:1}
.completed-head{display:flex;align-items:center;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);padding:12px 2px;cursor:pointer;border-top:1px solid var(--border);margin-top:8px}
.done-card{opacity:0.6}
.undo-link{color:var(--blue);cursor:pointer;text-decoration:underline}

/* Gym card — modes, bodyweight, complete, extras */
.gym-mode-toggle{display:flex;gap:4px;background:#1c1c1c;border-radius:8px;padding:3px;margin-bottom:12px}
.gmt-btn{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:11px;padding:7px 0;border-radius:6px;border:none;background:none;color:var(--text3);cursor:pointer}
.gmt-btn.active{color:var(--text);background:var(--surface2)}
.gmt-btn.active.gmt-full{background:rgba(184,240,160,0.14);color:var(--green)}
.gmt-btn.active.gmt-school{background:rgba(160,200,240,0.14);color:var(--blue)}
.gmt-btn.active.gmt-body{background:rgba(240,208,160,0.14);color:var(--amber)}
.gym-complete-btn{width:100%;margin-top:12px;padding:12px;border-radius:var(--radius);border:1px solid var(--green-border);background:var(--green-bg);color:var(--green);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.03em;cursor:pointer}
.gym-complete-btn:active{transform:scale(0.99)}
.gym-complete-btn.done{border-color:var(--border2);background:var(--surface2);color:var(--text2)}

.rest-badge{color:var(--amber);background:rgba(240,208,160,0.12)}

.gym-extra.done span{text-decoration:line-through;text-decoration-color:var(--text3)}
.xtag{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);border:1px solid var(--green-border);border-radius:99px;padding:1px 6px;margin-left:2px}
.bw-row{padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.bw-row:last-of-type{border-bottom:none}
.bw-top{display:flex;align-items:center;justify-content:space-between}
.bw-pattern{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--amber)}

.bw-step:disabled{opacity:0.3;cursor:default}

.rung-btns{display:inline-flex;gap:6px;margin-left:auto}

/* Nutrition — Today target card */
.nutri-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:20px}
.nutri-daytype{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);background:rgba(184,240,160,0.12);padding:3px 9px;border-radius:99px}
.nutri-nums{display:flex;gap:22px;margin-bottom:12px}
.nutri-big{font-family:'DM Mono',monospace;font-size:20px;color:var(--text)}
.nutri-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px}
.nutri-pbar{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:8px}
.nutri-pfill{height:100%;background:var(--green);border-radius:99px;transition:width 0.4s ease}
.nutri-macros{display:flex;gap:14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:10px}
.nutri-hint{font-size:12px;color:var(--text2);line-height:1.6}

/* Nutrition page */
.nutri-back{background:none;border:none;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;padding:0 0 14px}
.nutri-plan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px}
.nutri-plan-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:12px}

.ntg-col{flex:1;background:var(--surface2);border-radius:var(--radius);padding:10px 12px}
.ntg-head{font-family:'DM Mono',monospace;font-size:11px;margin-bottom:4px}
.ntg-big{font-family:'DM Mono',monospace;font-size:22px;color:var(--text)}
.ntg-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px;line-height:1.5}
.nutri-plan-note{font-size:12px;color:var(--text2);line-height:1.65}
.nutri-plan-note b{color:var(--text)}
.nutri-meal{padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.nutri-meal-head{display:flex;justify-content:space-between;align-items:baseline}
.nutri-meal-name{font-size:14px;color:var(--text)}
.nutri-meal-p{font-family:'DM Mono',monospace;font-size:11px;color:var(--green)}
.nutri-meal-food{font-size:12px;color:var(--text2);margin-top:2px}
.nutri-dial,.nutri-guard{font-size:12px;color:var(--text2);line-height:1.65;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.nutri-dial:last-child,.nutri-guard:last-child{border-bottom:none}
.nutri-dial b{color:var(--text)}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── Habit data ────────────────────────────────────────────────────────────
// XP CALIBRATION: each habit can carry {stat, xp}. Ticking awards xp to that
// stat; un-ticking subtracts the same amount (see recordStatXp). All values
// are tunable here in one place. Stats: physical, mental, financial, character, aesthetic.
// Gym is now its own subsystem (see PROGRAM/scheduling below), not day-indexed
// habits. These two optional extras live on the Today gym card.
const GYM_EXTRAS=[
  {id:'dh',label:'Dead hang — max hold, 1–2 sets',xp:5},
  {id:'lw',label:'Log today\u2019s weights in Gym log',xp:5}
];
function gxKey(id){return 'gx-'+td()+'-'+id}
function gymExtraDone(id){return !!S[gxKey(id)]}
function toggleGymExtra(id){const k=gxKey(id);const nv=!S[k];S[k]=nv;const e=GYM_EXTRAS.find(function(x){return x.id===id});if(e)awardStat('physical',nv?e.xp:-e.xp);save();renderTracker();}
const FOOD=[
  {label:'Breakfast eaten',tag:'food',stat:'physical',xp:10,p:26,sub:'~26g protein — 4-egg omelette + veg, or eggs + oats + banana. Ask for eggs if you\u2019re not cooking'},
  {label:'Snack / skin bowl eaten',tag:'food',stat:'physical',xp:5,p:23,sub:'~23g protein — Greek yogurt + banana + berries + nuts + chia. Doubles as your skin bowl (omega-3s, antioxidants)'},
  {label:'Lunch eaten',tag:'food',stat:'physical',xp:10,p:56,sub:'~56g protein — 180g chicken + rice + veg. Bigger rice on training days, smaller on rest'},
  {label:'Dinner eaten',tag:'food',stat:'physical',xp:10,p:35,sub:'~35g protein — 150g salmon (or turkey/mince) + potato or rice + veg. Ask for a palm-sized protein + veg'},
  {label:'Fruit + fibre hit',tag:'food',sid:'nutrition',stat:'physical',xp:5,p:3,sub:'1 banana + 1 other fruit. 25–30g fibre — oats, broccoli, beans all count'},
  {label:'Drank 2–2.5 litres of water',tag:'food',stat:'physical',xp:5},
  {label:'Multivitamin + vitamin D taken',tag:'food',stat:'physical',xp:5}
];
const SKIN=[
  {label:'Morning: cleanser + SPF + moisturiser',tag:'skin',sid:'skin',stat:'aesthetic',xp:10},
  {label:'Evening: cleanser + BP + moisturiser',tag:'skin',stat:'aesthetic',xp:10,sub:'Apply benzoyl peroxide (2.5–5%) to acne-prone areas only. Leave 5 min before moisturiser. Do not mix with adapalene — use BP in evenings without adapalene only'}
];
const SKIN_A=[
  {label:'Morning: cleanser + SPF + moisturiser',tag:'skin',sid:'skin',stat:'aesthetic',xp:10},
  {label:'Evening: cleanser + BP + moisturiser',tag:'skin',stat:'aesthetic',xp:10,sub:'Adapalene night: skip BP or apply BP to different zones. Do not layer them together — BP deactivates adapalene'},
  {label:'Adapalene applied tonight',tag:'skin',stat:'aesthetic',xp:5}
];
const HAIR=[{label:'Minoxidil applied (night)',tag:'hair',sid:'hair',stat:'aesthetic',xp:10}];
const WALK={label:'Walk home — part of 8,000–10,000 step daily goal',tag:'activity',sid:'walk',stat:'physical',xp:15,sub:'35–40 min brisk walk. Counts for ~3,500–4,000 of your daily steps'};
const BED={label:'In bed by 22:30 — aim 8h sleep',tag:'rest',sid:'sleep',stat:'physical',xp:15,sub:'Same time every night. 22:30 → up ~06:30. Consistency anchors your body clock'};

const DAYS=[
  {label:'Mon',name:'Monday',
   habits:[...FOOD,...SKIN,...HAIR,WALK,BED]},
  {label:'Tue',name:'Tuesday',
   habits:[...FOOD,...SKIN,...HAIR,WALK,BED]},
  {label:'Wed',name:'Wednesday',
   habits:[...FOOD,...SKIN_A,...HAIR,WALK,BED]},
  {label:'Thu',name:'Thursday',
   habits:[...FOOD,{label:'T/Gel shampoo wash (2× this week)',tag:'hair',stat:'aesthetic',xp:5},...SKIN,...HAIR,WALK,BED]},
  {label:'Fri',name:'Friday',
   habits:[...FOOD,...SKIN_A,...HAIR,WALK,BED]},
  {label:'Sat',name:'Saturday',
   habits:[...FOOD,...SKIN,...HAIR,{label:'Weekly weigh-in (fasted, morning) — log in Progress tab',tag:'activity',stat:'physical',xp:5},BED]},
  {label:'Sun',name:'Sunday',note:'Good day to prep: cook protein in bulk, sort meals for the week.',
   habits:[...FOOD,{label:'Prep meals for the week ahead',tag:'food',stat:'physical',xp:5},...SKIN_A,...HAIR,BED]}
];

const SECTIONS=[{key:'gym',label:'Gym'},{key:'food',label:'Nutrition'},{key:'skin',label:'Skincare'},{key:'hair',label:'Hair'},{key:'activity',label:'Activity'},{key:'rest',label:'Sleep'}];
// ── Training program (full-body A/B/C, three equipment modes) ──────────────
// Full & School log kg×reps. Bodyweight is its own flow (ladders below).
const PROGRAM={
  A:{
    full:[{ex:'Back squat',sets:'3×6–8'},{ex:'Bench press',sets:'3×6–8'},{ex:'Pull-ups / lat pulldown',sets:'3×8–10'},{ex:'Dumbbell curls',sets:'3×10–12'},{ex:'Triceps pushdown',sets:'3×10–12'},{ex:'Hanging leg raises',sets:'3×10–15'}],
    school:[{ex:'Back squat',sets:'3×6–8'},{ex:'Bench press',sets:'3×6–8'},{ex:'Cable lat pulldown',sets:'3×8–10'},{ex:'Dumbbell curls',sets:'3×10–12'},{ex:'Cable triceps pushdown',sets:'3×10–12'},{ex:'Lying leg raises',sets:'3×12–15'}]
  },
  B:{
    full:[{ex:'Romanian deadlift',sets:'3×8–10'},{ex:'Overhead press',sets:'3×6–8'},{ex:'Barbell row',sets:'3×8–10'},{ex:'Hammer curls',sets:'3×10–12'},{ex:'Overhead triceps extension',sets:'3×10–12'},{ex:'Cable crunch',sets:'3×12–15'}],
    school:[{ex:'Romanian deadlift',sets:'3×8–10'},{ex:'Overhead press',sets:'3×6–8'},{ex:'Barbell row',sets:'3×8–10'},{ex:'Hammer curls',sets:'3×10–12'},{ex:'Overhead DB triceps extension',sets:'3×10–12'},{ex:'Cable crunch',sets:'3×12–15'}]
  },
  C:{
    full:[{ex:'Leg press / front squat',sets:'3×8–10'},{ex:'Incline dumbbell press',sets:'3×8–10'},{ex:'Chest-supported row',sets:'3×10'},{ex:'Incline dumbbell curls',sets:'3×10–12'},{ex:'Skullcrushers / dips',sets:'3×8–12'},{ex:'Ab wheel',sets:'3×8–12'}],
    school:[{ex:'Goblet / front squat',sets:'3×8–10'},{ex:'Incline dumbbell press',sets:'3×8–10'},{ex:'Seated cable row',sets:'3×10'},{ex:'Incline / standing dumbbell curls',sets:'3×10–12'},{ex:'Skullcrushers',sets:'3×8–12'},{ex:'Cable crunch / ab wheel',sets:'3×8–12'}]
  }
};
// Bodyweight is the SAME 6-pattern full-body session every time (not A/B/C).
// You progress by climbing each pattern's ladder, not by adding weight.
const LADDERS={
  push:{label:'Push',target:'3×12',rungs:['Wall push-up','Incline push-up','Knee push-up','Negative push-up','Full push-up','Feet-elevated / diamond push-up']},
  pull:{label:'Pull',target:'3×12 each side',rungs:['Doorway towel row','Backpack row','Table inverted row']},
  squat:{label:'Squat',target:'3×15',rungs:['Box / chair squat','Bodyweight squat','Tempo squat','Split squat','Bulgarian split squat','Pistol progression']},
  hinge:{label:'Hinge',target:'3×15',rungs:['Glute bridge','Tempo glute bridge','Single-leg glute bridge','Feet-elevated hip thrust','Single-leg RDL']},
  lunge:{label:'Lunge',target:'3×10 each leg',rungs:['Reverse lunge','Walking lunge','Backpack-loaded lunge']},
  core:{label:'Core',target:'3×40 sec',rungs:['Knee plank','Full plank','Feet-elevated plank','Dead bug','Lying leg raises','Hollow-body hold']}
};
const LADDER_ORDER=['push','pull','squat','hinge','lunge','core'];
const BW_DEFAULT={push:2,pull:1,squat:1,hinge:0,lunge:0,core:1};
const GYM_MODES=[{id:'full',label:'Full gym'},{id:'school',label:'School'},{id:'body',label:'Bodyweight'}];
const GYM_LETTERS=['A','B','C'];

function bwRung(p){const v=S['bwrung-'+p];return typeof v==='number'?v:BW_DEFAULT[p]}
function bwLevel(p,dir){const max=LADDERS[p].rungs.length-1;S['bwrung-'+p]=Math.max(0,Math.min(max,bwRung(p)+dir));save();renderTracker();renderGymLog();}

// Flexible scheduling: train any day, then rest the next 2 days. A→B→C rotates.
function gymSessionDates(){return Object.keys(S).filter(k=>/^gymsess-\d{4}-\d{2}-\d{2}$/.test(k)).map(k=>k.slice(8)).sort()}
function nextGymLetter(){return GYM_LETTERS[gymSessionDates().length%3]}
function dayGap(a,b){return Math.round((new Date(b+'T00:00')-new Date(a+'T00:00'))/86400000)}
function lastGymOnOrBefore(dateStr){const ds=gymSessionDates().filter(d=>d<=dateStr);return ds.length?ds[ds.length-1]:null}
function addDaysStr(dateStr,n){const dt=new Date(dateStr+'T00:00');dt.setDate(dt.getDate()+n);return ymd(dt)}
// {state:'done'|'rest'|'ready', ...}
function gymTodayState(){
  const today=td();
  if(S['gymsess-'+today])return {state:'done',day:S['gymsess-'+today]};
  const last=lastGymOnOrBefore(today);
  if(last){const gap=dayGap(last,today);if(gap<3)return {state:'rest',last:last,gap:gap,nextAvail:addDaysStr(last,3)};}
  return {state:'ready',day:nextGymLetter()};
}
function gymMode(dateStr){return S['gymmode-'+dateStr]||S['gymmode']||'full'}
function setGymMode(m){const t=td();S['gymmode-'+t]=m;S['gymmode']=m;save();renderTracker();renderGymLog();}
function completeGymSession(){
  const st=gymTodayState();const today=td();
  if(st.state==='done'){
    delete S['gymsess-'+today];S[streakHitKey(today,'gym')]=false;awardStat('physical',-15);
  } else if(st.state==='ready'){
    S['gymsess-'+today]=st.day;S[streakHitKey(today,'gym')]=true;awardStat('physical',15);
  } else return; // rest day — do nothing
  save();renderTracker();
}
// Exercises for a given workout letter + mode (bodyweight resolves current rungs)
function gymExercises(letter,mode){
  if(mode==='body')return LADDER_ORDER.map(function(p){const r=bwRung(p);return {ex:LADDERS[p].rungs[r],sets:LADDERS[p].target,pattern:p,rung:r};});
  return (PROGRAM[letter]&&PROGRAM[letter][mode])||PROGRAM[letter].full;
}
function fmtDayLabel(dateStr){const dt=new Date(dateStr+'T00:00');return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()]}

// ── Nutrition ──────────────────────────────────────────────────────────────
const NUTRITION={training:{kcal:2300,carbs:250,fat:60},rest:{kcal:2000,carbs:200,fat:60},protein:135};
// Rest-lock day = rest-day fuel; any trainable/trained day = training-day fuel
function isTrainingDay(){return gymTodayState().state!=='rest'}
function nutritionTargets(){const t=isTrainingDay()?NUTRITION.training:NUTRITION.rest;return {kcal:t.kcal,protein:NUTRITION.protein,carbs:t.carbs,fat:t.fat,training:isTrainingDay()}}
function proteinToday(){const ti=todayIdx();let sum=0;DAYS[ti].habits.forEach(function(hb,i){if(hb.p&&S[hk(ti,i)])sum+=hb.p});return sum}
function updateProteinStreak(){S[streakHitKey(td(),'protein')]=proteinToday()>=NUTRITION.protein;save();}

// ── Stats (RPG levelling) ──────────────────────────────────────────────────
// Five stats. Cumulative XP per stat lives in S['sxp-<id>']. Daily habits feed
// Physical & Aesthetic; Mental/Financial/Character are fed only by goals you set.
const STAT_DEFS=[
  {id:'physical', label:'Physical', cat:'sc-walk',     hint:'gym · walk · sleep · nutrition + goals', def:'Anything contributing to your body or mind\u2019s overall health, fitness, or physique.'},
  {id:'mental',   label:'Mental',   cat:'sc-gym',      hint:'learning · skills · knowledge',                     def:'Anything building aptitude in skills requiring intelligence or knowledge.'},
  {id:'financial',label:'Financial',cat:'sc-skin',     hint:'saving · earning · enterprise',                     def:'Anything building economic wealth, prospects, or entrepreneurial ability.'},
  {id:'character', label:'Character',cat:'sc-hair',    hint:'passions · talents · values',                     def:'Anything developing you as a unique, interesting individual: passions, talents, personality, values.'},
  {id:'aesthetic',label:'Aesthetic',cat:'sc-aesthetic',hint:'skincare · hair · grooming + goals',     def:'Anything improving social attractiveness through presentation: hygiene, looks, clothing, fragrance.'}
];
// Accent colour per stat id (matches :root vars)

// XP curve: cost to go from level L to L+1 is 100*L. Fast early, slow to master.
function xpToNext(L){return 100*L}
function cumulativeToReach(L){return 50*L*(L-1)} // XP needed to *reach* level L
function statXp(id){const v=S['sxp-'+id];return typeof v==='number'&&v>0?v:0}
// Derive {level, intoLevel, need, fill} from a cumulative total
function statProgress(total){
  let L=1;
  while(cumulativeToReach(L+1)<=total)L++;
  const intoLevel=total-cumulativeToReach(L);
  const need=xpToNext(L);
  return {level:L,intoLevel:intoLevel,need:need,fill:need>0?Math.min(1,intoLevel/need):0};
}
// The ONLY mutator of stat XP. Positive awards, negative claws back. Clamped at 0.
function awardStat(id,amount){
  if(!id||!amount)return;
  const cur=statXp(id);
  S['sxp-'+id]=Math.max(0,cur+amount);
  save();
}
// Called from toggle() alongside recordStreakHit. Symmetric: tick adds, untick subtracts.
function recordStatXp(di,hi,val){
  const h=DAYS[di].habits[hi];
  if(!h||!h.stat||!h.xp)return;
  awardStat(h.stat,val?h.xp:-h.xp);
}

let S={},curDay=0,curMuscle=0,wChart=null,curGymLetter='A';
// Format a Date as YYYY-MM-DD in LOCAL time (avoids UTC midnight misattribution)
function ymd(dt){
  const y=dt.getFullYear();
  const m=String(dt.getMonth()+1).padStart(2,'0');
  const d=String(dt.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
// Returns the Date of the Monday that starts the week containing dt (local time)
function mondayOf(dt){
  const dow=dt.getDay(); // 0=Sun
  const diff=dow===0?-6:1-dow; // shift to Monday
  const mon=new Date(dt);mon.setDate(dt.getDate()+diff);mon.setHours(0,0,0,0);
  return mon;
}
// Returns YYYY-MM-DD of the Monday that starts the current week
function weekMonday(){return ymd(mondayOf(new Date()))}
// Habit key: based on week's Monday date + day index + habit index
// Stable all week regardless of app updates
function hk(d,i){return'h-'+weekMonday()+'-d'+d+'-'+i}
function bwk(dt){return'bw-'+dt}
function td(){return ymd(new Date())}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function load(){
  try{S=JSON.parse(localStorage.getItem('ps')||'{}')}catch(e){S={}}
  // Migrate old week-number keys (wYYYY-NN-dD-hI) to new date-based keys
  const mon=weekMonday();
  Object.keys(S).forEach(function(k){
    if(/^w\d{4}-\d+-d\d+-h\d+$/.test(k)){
      const parts=k.split('-');
      // parts: ['wYYYY', 'NN', 'dD', 'hI'] — extract day and habit index
      const dayPart=parts[2].replace('d','');
      const habPart=parts[3].replace('h','');
      const newKey='h-'+mon+'-d'+dayPart+'-'+habPart;
      if(!(newKey in S))S[newKey]=S[k];
      delete S[k];
    }
  });
  // Migrate legacy gym draft keys (gym-DATE-name = array) into saved-session
  // history (gs-DATE-name). In the old model these arrays were the only record
  // and Save deleted them; preserving them here means no logged data is lost.
  Object.keys(S).forEach(function(k){
    if(/^gym-\d{4}-\d{2}-\d{2}-/.test(k) && Array.isArray(S[k])){
      const newKey='gs-'+k.slice(4);
      if(!(newKey in S))S[newKey]=S[k];
      delete S[k];
    }
  });
  // One-time: removing the gym habits shifted Mon/Tue/Thu habit indices, so
  // clear THIS week's ticks for those days to avoid a misaligned display.
  // (Habit ticks are weekly + ephemeral; XP already banked stays banked.)
  if(!S['mig-gymsplit']){
    const wm=weekMonday();
    [0,1,3].forEach(function(di){
      Object.keys(S).forEach(function(k){if(k.indexOf('h-'+wm+'-d'+di+'-')===0)delete S[k];});
    });
    S['mig-gymsplit']=true;
  }
  save();
}
function save(){try{localStorage.setItem('ps',JSON.stringify(S))}catch(e){}}
function prog(di){const h=DAYS[di].habits;return{done:h.filter((_,i)=>S[hk(di,i)]).length,total:h.length}}

// ── Streak calculation ────────────────────────────────────────────────────
// Store per-day whether a sid was hit: 'streak-YYYY-MM-DD-sid' = true/false
function streakHitKey(dateStr,sid){return'sh-'+dateStr+'-'+sid}

// Called when a habit is toggled.
// Checks ALL habits with this sid on this day — only marks miss if none are ticked.
// This means unticking one habit won't break the streak if another with the same sid is still on.
function recordStreakHit(di,hi,val){
  const h=DAYS[di].habits[hi];
  if(!h.sid)return;
  const sid=h.sid;
  const dateStr=td();
  // If we just ticked this habit on, it's definitely a hit
  if(val){
    S[streakHitKey(dateStr,sid)]=true;
    save();
    return;
  }
  // If we unticked, check if any other habit with the same sid is still ticked on this day
  const anyStillHit=DAYS[di].habits.some(function(hb,idx){
    return hb.sid===sid && idx!==hi && !!S[hk(di,idx)];
  });
  S[streakHitKey(dateStr,sid)]=anyStillHit;
  save();
}

function calcStreak(def){
  // Walk backwards from today counting consecutive hit days/weeks
  const isWeekly=def.unit==='week';
  let streak=0;
  const today=new Date();
  if(isWeekly){
    // Count consecutive Monday-aligned weeks with at least 3 hits.
    // Weeks align to the same Monday-start boundaries used everywhere else.
    const thisMon=mondayOf(today);
    for(let w=0;w<52;w++){
      const weekStart=new Date(thisMon);weekStart.setDate(thisMon.getDate()-w*7);
      let hitsThisWeek=0;
      for(let d=0;d<7;d++){
        const dt=new Date(weekStart);dt.setDate(weekStart.getDate()+d);
        if(dt>today)continue; // ignore future days in the current week
        if(S[streakHitKey(ymd(dt),def.sid)])hitsThisWeek++;
      }
      if(hitsThisWeek>=3)streak++;
      else if(w>0)break; // allow current partial week
      else if(hitsThisWeek===0)break;
    }
  } else {
    for(let d=0;d<365;d++){
      const dt=new Date(today);
      dt.setDate(today.getDate()-d);
      const ds=ymd(dt);
      if(S[streakHitKey(ds,def.sid)])streak++;
      else if(d>0)break;
    }
  }
  return streak;
}

function getLast14(def){
  const isWeekly=def.unit==='week';
  const today=new Date();
  const result=[];
  const count=isWeekly?8:14;
  if(isWeekly){
    const thisMon=mondayOf(today);
    for(let i=count-1;i>=0;i--){
      const weekStart=new Date(thisMon);weekStart.setDate(thisMon.getDate()-i*7);
      let hits=0;
      for(let d=0;d<7;d++){
        const dt=new Date(weekStart);dt.setDate(weekStart.getDate()+d);
        if(dt>today)continue;
        if(S[streakHitKey(ymd(dt),def.sid)])hits++;
      }
      result.push(hits>=3?'hit':hits>0?'partial':'miss');
    }
  } else {
    for(let i=count-1;i>=0;i--){
      const dt=new Date(today);dt.setDate(today.getDate()-i);
      result.push(S[streakHitKey(ymd(dt),def.sid)]?'hit':'miss');
    }
  }
  return result;
}

function getMilestone(def,streak){
  const ms=[...def.milestones].reverse();
  return ms.find(m=>streak>=m.days)||def.milestones[0];
}

// Human label for a milestone's own threshold (self-consistent with its text).
// Replaces the old per-milestone nextLabel, which described the NEXT step and
// so got shown against the wrong milestone's body text.
function milestoneLabel(def,m){
  const n=m.days;
  if(def.unit==='week'){
    const wk={1:'Week 1',2:'2 weeks',4:'1 month',8:'2 months',12:'3 months'};
    return wk[n]||(n+' weeks');
  }
  const dy={1:'Day 1',3:'3 days',7:'1 week',14:'2 weeks',30:'1 month',45:'6 weeks',60:'2 months',90:'3 months',180:'6 months'};
  return dy[n]||('Day '+n);
}

  const v=document.getElementById('weightInput').value;
  if(!v||isNaN(v))return;
  S[bwk(td())]=parseFloat(v);save();
  document.getElementById('weightInput').value='';
  renderProgress();
}
function getWeights(){return Object.keys(S).filter(k=>k.startsWith('bw-')).map(k=>({date:k.replace('bw-',''),val:S[k]})).sort((a,b)=>a.date.localeCompare(b.date))}
function renderProgress(){
  const entries=getWeights();
  const start=75,target=69;
  const cur=entries.length?entries[entries.length-1].val:start;
  const lost=Math.max(0,parseFloat((start-cur).toFixed(1)));
  const toGo=Math.max(0,parseFloat((cur-target).toFixed(1)));
  document.getElementById('statsGrid').innerHTML=
    '<div class="stat-card"><div class="stat-label">Current</div><div class="stat-value">'+cur+'<span style="font-size:14px;color:var(--text2)"> kg</span></div><div class="stat-sub">Started at '+start+' kg</div></div>'+
    '<div class="stat-card"><div class="stat-label">Lost so far</div><div class="stat-value">'+lost+'<span style="font-size:14px;color:var(--text2)"> kg</span></div><div class="stat-sub">Target: '+target+' kg</div></div>'+
    '<div class="stat-card"><div class="stat-label">To go</div><div class="stat-value">'+toGo+'<span style="font-size:14px;color:var(--text2)"> kg</span></div><div class="stat-sub">Goal: '+target+' kg</div></div>'+
    '<div class="stat-card"><div class="stat-label">Weigh-ins</div><div class="stat-value">'+entries.length+'</div><div class="stat-sub">This journey</div></div>';
  const empty=document.getElementById('weightChartEmpty'),cnv=document.getElementById('weightChart');
  if(entries.length<2){empty.style.display='flex';cnv.style.display='none'}
  else{
    empty.style.display='none';cnv.style.display='block';
    const labels=entries.map(e=>{const p=e.date.split('-');return p[2]+'/'+p[1]});
    const data=entries.map(e=>e.val);
    if(wChart)wChart.destroy();
    wChart=new Chart(cnv,{type:'line',data:{labels,datasets:[{data,borderColor:'#b8f0a0',backgroundColor:'rgba(184,240,160,0.08)',borderWidth:2,pointBackgroundColor:'#b8f0a0',pointRadius:4,tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1c1c',titleColor:'#888',bodyColor:'#f0f0f0',borderColor:'rgba(255,255,255,0.12)',borderWidth:1,callbacks:{label:ctx=>ctx.parsed.y+' kg'}}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#555',font:{family:'DM Mono',size:10}}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#555',font:{family:'DM Mono',size:10},callback:v=>v+' kg'},suggestedMin:Math.min(...data)-2,suggestedMax:Math.max(...data)+1}}}});
  }
  const hist=document.getElementById('weightHistory');
  if(!entries.length){hist.innerHTML='';return}
  hist.innerHTML=[...entries].reverse().slice(0,8).map((e,i,arr)=>{
    const prev=arr[i+1];let delta='';
    if(prev){const diff=parseFloat((e.val-prev.val).toFixed(1));if(diff<0)delta='<span class="history-delta delta-down">'+diff+' kg</span>';else if(diff>0)delta='<span class="history-delta delta-up">+'+diff+' kg</span>'}
    return'<div class="history-item"><span class="history-date">'+e.date+'</span><span class="history-val">'+e.val+' kg '+delta+'</span></div>';
  }).join('');
}

// ── Gym log ───────────────────────────────────────────────────────────────
const exerciseCharts={};

// Two key namespaces:
//   gd-YYYY-MM-DD-<safe>  draft: the editable, in-progress sets for that day
//   gs-YYYY-MM-DD-<safe>  saved: a committed session record (what charts read)
// Saving copies draft -> saved and clears the draft, so logged data persists.
function exSafe(ex){return ex.replace(/[^a-zA-Z0-9]/g,'_')}
function draftKey(dateStr,ex){return'gd-'+dateStr+'-'+exSafe(ex)}
function savedKey(dateStr,ex){return'gs-'+dateStr+'-'+exSafe(ex)}

// Parse a gym key of the form <prefix><date>-<safe> robustly (no fixed offsets).
function parseGymKey(k,prefix){
  if(!k.startsWith(prefix))return null;
  const m=k.slice(prefix.length).match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
  return m?{date:m[1],safe:m[2]}:null;
}

function getExHistory(ex){
  const safeName=exSafe(ex);
  const entries=[];
  Object.keys(S).forEach(k=>{
    const parsed=parseGymKey(k,'gs-');
    if(!parsed||parsed.safe!==safeName)return;
    const sets=S[k];
    if(!Array.isArray(sets))return;
    let best=0,bestW=0,bestR=0;
    sets.forEach(s=>{
      const w=parseFloat(s.w)||0,r=parseInt(s.r)||0;
      if(r>0){const m=w>0?w*r:r;if(m>best){best=m;bestW=w;bestR=r}}
    });
    if(best>0)entries.push({date:parsed.date,metric:best,bestW:bestW,bestR:bestR});
  });
  return entries.sort((a,b)=>a.date.localeCompare(b.date));
}

// ── Gym log ────────────────────────────────────────────────────────────────

function renderGymLog(){
  const mode=gymMode(td());
  const st=gymTodayState();
  // Default the day selector to today's session letter (or next up)
  if(st.state!=='rest'&&st.day&&GYM_LETTERS.indexOf(curGymLetter)<0)curGymLetter=st.day;

  // Day A/B/C tabs (hidden in bodyweight — it's one fixed full-body session)
  let tabsHtml='';
  if(mode!=='body'){
    tabsHtml=GYM_LETTERS.map(function(L){
      const isToday=st.day===L&&st.state!=='rest';
      return '<button class="muscle-tab'+(L===curGymLetter?' active':'')+(isToday?' muscle-tab-today':'')+'" onclick="switchGymLetter(\''+L+'\')">Day '+L+(isToday?' ●':'')+'</button>';
    }).join('');
  } else {
    tabsHtml='<div class="gym-bw-note">Bodyweight · one full-body session. Log the rung you\u2019re on for each pattern.</div>';
  }
  document.getElementById('muscleTabs').innerHTML=gymModeToggle(mode)+tabsHtml;

  const letter=mode==='body'?'A':curGymLetter;
  const exs=gymExercises(letter,mode);
  const container=document.getElementById('gymLogContent');
  container.innerHTML='';

  exs.forEach(function(e){
    const ex=e.ex;
    const safe=exSafe(ex);
    const k=draftKey(td(),ex);
    const sets=S[k]?S[k]:[{w:'',r:''}];
    const history=getExHistory(ex);
    const best=history.length?history.reduce(function(b,x){return x.metric>b.metric?x:b}):null;
    const chartId='exchart_'+safe;

    const card=document.createElement('div');card.className='exercise-log-card';
    const nameEl=document.createElement('div');nameEl.className='ex-log-name';
    nameEl.textContent=ex+(e.sets?'  ·  '+e.sets:'');card.appendChild(nameEl);

    if(mode==='body'&&e.pattern){
      const max=LADDERS[e.pattern].rungs.length-1;
      const rl=document.createElement('div');rl.className='ex-rung-line';
      rl.innerHTML='rung '+(e.rung+1)+'/'+(max+1)+' · '+LADDERS[e.pattern].label
        +' <span class="rung-btns"><button class="bw-step" onclick="bwLevel(\''+e.pattern+'\',-1)"'+(e.rung<=0?' disabled':'')+'>\u2212</button>'
        +'<button class="bw-step" onclick="bwLevel(\''+e.pattern+'\',1)"'+(e.rung>=max?' disabled':'')+'>+</button></span>';
      card.appendChild(rl);
    }

    if(best){
      const pb=document.createElement('div');pb.className='prev-best';
      pb.textContent='Best: '+(best.bestW>0?best.bestW+' kg × '+best.bestR+' reps':best.bestR+' reps')+' ('+best.date+')';
      card.appendChild(pb);
    }

    const setsWrap=document.createElement('div');setsWrap.id='sets_'+safe;
    sets.forEach(function(s,si){setsWrap.appendChild(makeSetRow(safe,si,s,sets.length>1,mode==='body'));});
    card.appendChild(setsWrap);
    const btnRow=document.createElement('div');btnRow.className='set-btn-row';
    const addBtn=document.createElement('button');addBtn.className='add-set-btn';addBtn.textContent='+ add set';
    addBtn.onclick=function(){addSet(safe)};btnRow.appendChild(addBtn);card.appendChild(btnRow);

    if(history.length>=2){
      const lbl=document.createElement('div');lbl.className='ex-chart-label';
      lbl.textContent=best&&best.bestW>0?'Volume trend (kg × reps)':'Reps trend';card.appendChild(lbl);
      const wrap=document.createElement('div');wrap.className='ex-chart-wrap';
      const cnv=document.createElement('canvas');cnv.id=chartId;wrap.appendChild(cnv);card.appendChild(wrap);
    } else {
      const empty=document.createElement('div');empty.className='ex-chart-empty';
      empty.textContent='Log 2+ sessions to unlock your progress chart';card.appendChild(empty);
    }
    container.appendChild(card);
  });

  const saveBtn=document.createElement('button');
  saveBtn.className='log-session-btn';saveBtn.id='saveBtn';saveBtn.textContent='Save session';
  saveBtn.onclick=function(){saveSession(exs)};
  container.appendChild(saveBtn);
  const spacer=document.createElement('div');spacer.style.height='8px';container.appendChild(spacer);

  requestAnimationFrame(function(){
    exs.forEach(function(e){
      const history=getExHistory(e.ex);
      if(history.length<2)return;
      const chartId='exchart_'+exSafe(e.ex);
      const cnv=document.getElementById(chartId);if(!cnv)return;
      if(exerciseCharts[chartId])exerciseCharts[chartId].destroy();
      const labels=history.map(function(x){const p=x.date.split('-');return p[2]+'/'+p[1]});
      const data=history.map(function(x){return Math.round(x.metric*10)/10});
      const isVol=history[history.length-1].bestW>0;
      exerciseCharts[chartId]=new Chart(cnv,{
        type:'line',
        data:{labels:labels,datasets:[{data:data,borderColor:'#a0c8f0',backgroundColor:'rgba(160,200,240,0.07)',borderWidth:1.5,pointBackgroundColor:'#a0c8f0',pointRadius:4,pointHoverRadius:6,tension:0.3,fill:true}]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},
            tooltip:{backgroundColor:'#1c1c1c',titleColor:'#888',bodyColor:'#f0f0f0',borderColor:'rgba(255,255,255,0.12)',borderWidth:1,
              callbacks:{title:function(items){return labels[items[0].dataIndex]},
                label:function(ctx){var x=history[ctx.dataIndex];return x.bestW>0?(x.bestW+' kg x '+x.bestR+' reps'):(x.bestR+' reps')}}}},
          scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Mono',size:9},maxTicksLimit:6}},
            y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Mono',size:9},callback:function(v){return isVol?v+' vol':v+' reps'}},suggestedMin:Math.min.apply(null,data)*0.92}}}
      });
    });
  });
}

function makeSetRow(safe,si,s,canRemove,bw){
  const row=document.createElement('div');row.className='set-row';row.id='setrow_'+safe+'_'+si;
  const lbl=document.createElement('span');lbl.className='set-label';lbl.textContent='Set '+(si+1);row.appendChild(lbl);
  const wInput=document.createElement('input');
  wInput.className='set-input';wInput.type='number';wInput.step='0.5';wInput.min='0';
  wInput.placeholder=bw?'kg (opt)':'kg';wInput.value=(s.w!==''&&s.w!=null)?s.w:'';
  wInput.oninput=function(){updSet(safe,si,'w',this.value)};
  row.appendChild(wInput);
  const x=document.createElement('span');x.className='set-x';x.textContent='×';row.appendChild(x);
  const rInput=document.createElement('input');
  rInput.className='set-input';rInput.type='number';rInput.min='1';rInput.max='300';rInput.placeholder=bw?'reps / sec':'reps';
  rInput.value=(s.r!==''&&s.r!=null)?s.r:'';
  rInput.oninput=function(){updSet(safe,si,'r',this.value)};
  row.appendChild(rInput);
  if(canRemove){
    const rm=document.createElement('button');rm.className='remove-set-btn';rm.textContent='\u2212';
    rm.onclick=function(){removeSet(safe,si)};row.appendChild(rm);
  } else {const ph=document.createElement('div');ph.style.width='26px';row.appendChild(ph);}
  return row;
}

function switchGymLetter(L){curGymLetter=L;renderGymLog()}

function updSet(safe,si,field,val){
  const k=draftKey(td(),safe);
  const sets=S[k]||[{w:'',r:''}];
  if(!sets[si])sets[si]={w:'',r:''};
  sets[si][field]=val===''?'':(field==='w'?parseFloat(val):parseInt(val));
  S[k]=sets;save();
}

function addSet(safe){
  const k=draftKey(td(),safe);
  const sets=S[k]||[{w:'',r:''}];
  sets.push({w:'',r:''});S[k]=sets;save();renderGymLog();
}

function removeSet(safe,si){
  const k=draftKey(td(),safe);
  const sets=S[k]||[{w:'',r:''}];
  if(sets.length<=1)return;
  sets.splice(si,1);S[k]=sets;save();renderGymLog();
}

function saveSession(exs){
  const dateStr=td();
  const list=exs||gymExercises(gymMode(dateStr)==='body'?'A':curGymLetter,gymMode(dateStr));
  // Gather valid sets (reps required; kg optional for bodyweight) before mutating
  const commits=[];
  list.forEach(function(e){
    const ex=e.ex;
    const draft=S[draftKey(dateStr,ex)]||[];
    const clean=draft.filter(function(s){return parseInt(s.r)>0;})
                     .map(function(s){return{w:parseFloat(s.w)>0?parseFloat(s.w):0,r:parseInt(s.r)};});
    if(clean.length)commits.push({ex:ex,clean:clean});
  });
  const validSets=commits.reduce(function(n,c){return n+c.clean.length;},0);
  const b=document.getElementById('saveBtn');
  if(validSets===0){
    if(b){b.textContent='Enter reps first';b.style.borderColor='var(--red-border)';b.style.color='var(--red)';
      setTimeout(function(){b.textContent='Save session';b.style.borderColor='';b.style.color=''},2000);}
    return;
  }
  commits.forEach(function(c){
    const sk=savedKey(dateStr,c.ex);
    const existing=Array.isArray(S[sk])?S[sk]:[];
    S[sk]=existing.concat(c.clean);
    delete S[draftKey(dateStr,c.ex)];
  });
  save();
  if(b){b.textContent='Saved \u2713 '+validSets+' sets logged';b.style.borderColor='var(--green-border)';b.style.color='var(--green)';}
  setTimeout(function(){renderGymLog();},1400);
}

// ── Goals, commitments & todos ─────────────────────────────────────────────
// Each goal lives at S['goal-<id>']. Types: 'project' (steps), 'commitment'
// (recurring, ticks on Today), 'task' (one-off, ticks once on Today).
function getGoals(){
  return Object.keys(S).filter(k=>k.indexOf('goal-')===0)
    .map(k=>S[k]).filter(g=>g&&typeof g==='object')
    .sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
}
function getGoal(id){return S['goal-'+id]}
function saveGoal(g){S['goal-'+g.id]=g;save();}

// XP released by a project after `done` of `total` steps for a reward of R.
// Monotonic, never exceeds R, exactly R when done===total. Same fn used for
// awarding (delta on tick) and for claw-back on delete — so they always agree.
function releasedFor(R,total,done){
  if(total<=0)return 0;
  const d=Math.max(0,Math.min(done,total));
  return Math.round(R*d/total);
}
function projectDone(g){return (g.steps||[]).filter(s=>s.done).length}

// Commitment tick key: daily ticks per date, weekly ticks per week-Monday.
function commitKey(g,dateStr){
  return g.freq==='weekly' ? 'cm-'+g.id+'-w'+weekMonday() : 'cm-'+g.id+'-'+dateStr;
}
function isCommitTicked(g){return !!S[commitKey(g,td())]}

// ---- Mutations (all event-driven, reversible) ----
function toggleStep(id,si){
  const g=getGoal(id);if(!g||g.type!=='project')return;
  const total=g.steps.length;
  const oldDone=projectDone(g);
  g.steps[si].done=!g.steps[si].done;
  const newDone=projectDone(g);
  // Release/claw the XP increment for each stat reward independently
  (g.stats||[]).forEach(function(r){
    const delta=releasedFor(r.xp,total,newDone)-releasedFor(r.xp,total,oldDone);
    if(delta)awardStat(r.stat,delta);
  });
  if(newDone>=total){g.status='done';g.completedAt=td();}
  else{g.status='active';g.completedAt=null;}
  saveGoal(g);renderGoals();
}
function toggleTask(id){
  const g=getGoal(id);if(!g||g.type!=='task')return;
  const completing=g.status!=='done';
  (g.stats||[]).forEach(function(r){awardStat(r.stat,completing?r.xp:-r.xp)});
  g.status=completing?'done':'active';
  g.completedAt=completing?td():null;
  saveGoal(g);renderTracker();renderGoals();
}
function toggleCommitment(id){
  const g=getGoal(id);if(!g||g.type!=='commitment')return;
  const k=commitKey(g,td());
  const newVal=!S[k];
  S[k]=newVal;
  (g.stats||[]).forEach(function(r){awardStat(r.stat,newVal?r.xp:-r.xp)});
  save();renderTracker();
}
function addGoal(g){
  g.id=g.id||('g'+Date.now());
  g.status=g.status||'active';
  g.createdAt=g.createdAt||td();
  g.completedAt=g.completedAt||null;
  if(g.type==='project')g.steps=(g.steps||[]).map(s=>({text:typeof s==='string'?s:s.text,done:false}));
  saveGoal(g);
}
function deleteGoal(id){
  const g=getGoal(id);if(!g)return;
  // Claw back every point this goal released, so levels stay honest.
  if(g.type==='project'){
    const total=(g.steps||[]).length,done=projectDone(g);
    (g.stats||[]).forEach(function(r){awardStat(r.stat,-releasedFor(r.xp,total,done))});
  } else if(g.type==='task'){
    if(g.status==='done')(g.stats||[]).forEach(function(r){awardStat(r.stat,-r.xp)});
  } else if(g.type==='commitment'){
    // Reverse every banked tick, then remove the tick keys
    const pref='cm-'+g.id+'-';
    Object.keys(S).filter(k=>k.indexOf(pref)===0).forEach(function(k){
      if(S[k])(g.stats||[]).forEach(function(r){awardStat(r.stat,-r.xp)});
      delete S[k];
    });
  }
  delete S['goal-'+id];
  save();renderGoals();renderTracker();
}

// Active task/commitment rows for the Today screen
function todayGoalRows(){
  const goals=getGoals();
  const tasks=goals.filter(g=>g.type==='task'&&g.status!=='done');
  const commits=goals.filter(g=>g.type==='commitment'&&g.status!=='done');
  return {tasks:tasks,commits:commits};
}

// ── Goal form (in-memory draft, not persisted until saved) ─────────────────
let goalDraft=null;
function blankDraft(){return {type:'project',title:'',stats:[{stat:'physical',xp:50}],steps:[''],freq:'daily',due:''}}
function openGoalForm(){goalDraft=blankDraft();renderGoalForm();document.getElementById('goalFormWrap').style.display='block';document.getElementById('newGoalBtn').style.display='none';}
function closeGoalForm(){goalDraft=null;document.getElementById('goalFormWrap').style.display='none';document.getElementById('newGoalBtn').style.display='block';}
function gfType(t){goalDraft.type=t;renderGoalForm();}
function gfTitle(v){goalDraft.title=v;}
function gfStat(i,v){goalDraft.stats[i].stat=v;}
function gfXp(i,v){goalDraft.stats[i].xp=v===''?'':parseInt(v);}
function gfAddStat(){if(goalDraft.stats.length<5){goalDraft.stats.push({stat:'mental',xp:50});renderGoalForm();}}
function gfRemoveStat(i){if(goalDraft.stats.length>1){goalDraft.stats.splice(i,1);renderGoalForm();}}
function gfStep(i,v){goalDraft.steps[i]=v;}
function gfAddStep(){goalDraft.steps.push('');renderGoalForm();}
function gfRemoveStep(i){if(goalDraft.steps.length>1){goalDraft.steps.splice(i,1);renderGoalForm();}}
function gfFreq(v){goalDraft.freq=v;}
function gfDue(v){goalDraft.due=v;}

function renderGoalForm(){
  const d=goalDraft;if(!d)return;
  const statOpts=function(sel){return STAT_DEFS.map(s=>'<option value="'+s.id+'"'+(s.id===sel?' selected':'')+'>'+s.label+'</option>').join('')};
  let h='';
  h+='<input class="styled-input" style="width:100%;margin-bottom:10px" placeholder="Goal title" value="'+(d.title||'').replace(/"/g,'&quot;')+'" oninput="gfTitle(this.value)">';
  // type selector
  h+='<div class="gf-type-row">'+['project','commitment','task'].map(function(t){
    const lbl=t==='project'?'Project':t==='commitment'?'Commitment':'One-off';
    return '<button class="gf-type-btn'+(d.type===t?' active':'')+'" onclick="gfType(\''+t+'\')">'+lbl+'</button>';
  }).join('')+'</div>';
  const typeHint=d.type==='project'?'Long-term goal with steps. XP drips as you tick steps.'
    :d.type==='commitment'?'Recurring habit on your Today screen. Banks XP each time you tick it.'
    :'One-off task on Today. Banks its XP once when ticked.';
  h+='<div class="gf-hint">'+typeHint+'</div>';
  // stats rows
  h+='<div class="gf-label">Rewards</div>';
  d.stats.forEach(function(r,i){
    h+='<div class="gf-stat-row">'
      +'<select class="gf-select" onchange="gfStat('+i+',this.value)">'+statOpts(r.stat)+'</select>'
      +'<input class="set-input" type="number" min="1" style="width:84px" placeholder="XP" value="'+(r.xp===''?'':r.xp)+'" oninput="gfXp('+i+',this.value)">'
      +(d.stats.length>1?'<button class="remove-set-btn" onclick="gfRemoveStat('+i+')">\u2212</button>':'<div style="width:26px"></div>')
      +'</div>';
  });
  if(d.stats.length<5)h+='<button class="add-set-btn" style="margin-bottom:4px" onclick="gfAddStat()">+ add stat</button>';
  // type-specific
  if(d.type==='project'){
    h+='<div class="gf-label" style="margin-top:12px">Steps</div>';
    d.steps.forEach(function(s,i){
      h+='<div class="gf-step-row">'
        +'<input class="styled-input" style="flex:1" placeholder="Step '+(i+1)+'" value="'+(s||'').replace(/"/g,'&quot;')+'" oninput="gfStep('+i+',this.value)">'
        +(d.steps.length>1?'<button class="remove-set-btn" onclick="gfRemoveStep('+i+')">\u2212</button>':'<div style="width:26px"></div>')
        +'</div>';
    });
    h+='<button class="add-set-btn" onclick="gfAddStep()">+ add step</button>';
  } else if(d.type==='commitment'){
    h+='<div class="gf-label" style="margin-top:12px">Frequency</div>';
    h+='<div class="gf-type-row">'+['daily','weekly'].map(function(f){
      return '<button class="gf-type-btn'+(d.freq===f?' active':'')+'" onclick="gfFreq(\''+f+'\')">'+(f==='daily'?'Daily':'Weekly')+'</button>';
    }).join('')+'</div>';
    h+='<div class="gf-hint">Each XP value above is awarded per tick.</div>';
  } else if(d.type==='task'){
    h+='<div class="gf-label" style="margin-top:12px">Due (optional)</div>';
    h+='<input class="styled-input" type="date" style="width:100%;max-width:100%;box-sizing:border-box" value="'+(d.due||'')+'" oninput="gfDue(this.value)">';
  }
  h+='<div class="gf-actions">'
    +'<button class="gf-cancel" onclick="closeGoalForm()">Cancel</button>'
    +'<button class="save-btn" onclick="saveGoalFromForm()">Save goal</button>'
    +'</div>';
  document.getElementById('goalFormBody').innerHTML=h;
}
function saveGoalFromForm(){
  const d=goalDraft;if(!d)return;
  const title=(d.title||'').trim();
  const stats=d.stats.map(r=>({stat:r.stat,xp:parseInt(r.xp)})).filter(r=>r.stat&&r.xp>0);
  const err=document.getElementById('goalFormErr');
  if(!title){err.textContent='Give your goal a title.';return;}
  if(!stats.length){err.textContent='Add at least one stat reward with XP above 0.';return;}
  const g={type:d.type,title:title,stats:stats};
  if(d.type==='project'){
    const steps=d.steps.map(s=>(s||'').trim()).filter(Boolean);
    if(!steps.length){err.textContent='A project needs at least one step.';return;}
    g.steps=steps;
  } else if(d.type==='commitment'){
    g.freq=d.freq||'daily';
  } else if(d.type==='task'){
    if(d.due)g.due=d.due;
  }
  err.textContent='';
  addGoal(g);
  closeGoalForm();
  renderGoals();renderTracker();
}

// ── Goals page render ──────────────────────────────────────────────────────
function statPills(stats){
  return (stats||[]).map(function(r){
    const col=STAT_COLOUR[r.stat];
    const lbl=(STAT_DEFS.find(s=>s.id===r.stat)||{}).label||r.stat;
    return '<span class="reward-pill" style="color:'+col+';border-color:'+col+'">'+lbl+' +'+r.xp+'</span>';
  }).join('');
}
function renderGoals(){
  const goals=getGoals();
  const active=goals.filter(g=>g.status!=='done');
  const done=goals.filter(g=>g.status==='done');
  const host=document.getElementById('goalsList');
  let h='';
  if(!active.length){
    h+='<div class="goals-empty">No active goals yet. Tap <b>+ New goal</b> to set your first one — a project with steps, a recurring commitment, or a quick one-off task.</div>';
  }
  // Projects first, then commitments, then tasks
  const order={project:0,commitment:1,task:2};
  active.sort((a,b)=>(order[a.type]-order[b.type]));
  active.forEach(function(g){
    const col=STAT_COLOUR[(g.stats[0]||{}).stat]||'var(--text2)';
    if(g.type==='project'){
      const total=g.steps.length,dn=projectDone(g);
      const banked=(g.stats||[]).reduce((n,r)=>n+releasedFor(r.xp,total,dn),0);
      h+='<div class="goal-card" style="border-left-color:'+col+'">'
        +'<div class="goal-card-head"><span class="goal-title">'+esc(g.title)+'</span>'
        +'<button class="goal-del" onclick="confirmDelete(\''+g.id+'\')">\u2715</button></div>'
        +'<div class="goal-pills">'+statPills(g.stats)+'</div>'
        +'<div class="goal-progress-line">'+dn+' / '+total+' steps · +'+banked+' XP banked</div>'
        +'<div class="progress-track" style="margin:8px 0 12px"><div class="progress-fill" style="width:'+(total?dn/total*100:0)+'%;background:'+col+'"></div></div>';
      g.steps.forEach(function(s,si){
        h+='<div class="goal-step'+(s.done?' done':'')+'" onclick="toggleStep(\''+g.id+'\','+si+')">'
          +'<div class="check-box"><svg class="check-icon" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
          +'<span class="goal-step-text">'+esc(s.text)+'</span></div>';
      });
      h+='</div>';
    } else if(g.type==='commitment'){
      h+='<div class="goal-card slim" style="border-left-color:'+col+'">'
        +'<div class="goal-card-head"><span class="goal-title">'+esc(g.title)+'</span>'
        +'<button class="goal-del" onclick="confirmDelete(\''+g.id+'\')">\u2715</button></div>'
        +'<div class="goal-pills">'+statPills(g.stats)+'<span class="freq-pill">'+(g.freq==='weekly'?'weekly':'daily')+'</span></div>'
        +'<div class="goal-meta">Recurring · appears on Today</div>'
        +'</div>';
    } else {
      h+='<div class="goal-card slim" style="border-left-color:'+col+'">'
        +'<div class="goal-card-head"><span class="goal-title">'+esc(g.title)+'</span>'
        +'<button class="goal-del" onclick="confirmDelete(\''+g.id+'\')">\u2715</button></div>'
        +'<div class="goal-pills">'+statPills(g.stats)+'</div>'
        +'<div class="goal-meta">One-off'+(g.due?' · due '+g.due:'')+' · appears on Today</div>'
        +'</div>';
    }
  });
  // Completed (collapsed)
  if(done.length){
    h+='<div class="completed-head" onclick="toggleCompleted()"><span>Completed ('+done.length+')</span><span id="completedChevron">'+(completedOpen?'\u2212':'+')+'</span></div>';
    if(completedOpen){
      done.sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
      done.forEach(function(g){
        h+='<div class="goal-card slim done-card" style="border-left-color:'+(STAT_COLOUR[(g.stats[0]||{}).stat]||'var(--text3)')+'">'
          +'<div class="goal-card-head"><span class="goal-title">'+esc(g.title)+'</span>'
          +'<button class="goal-del" onclick="confirmDelete(\''+g.id+'\')">\u2715</button></div>'
          +'<div class="goal-pills">'+statPills(g.stats)+'</div>'
          +'<div class="goal-meta">Completed '+(g.completedAt||'')+'</div>'
          +(g.type==='task'?'<div class="goal-meta" style="margin-top:6px"><span class="undo-link" onclick="toggleTask(\''+g.id+'\')">undo</span></div>':'')
          +'</div>';
      });
    }
  }
  host.innerHTML=h;
}
let completedOpen=false;
function toggleCompleted(){completedOpen=!completedOpen;renderGoals();}
function confirmDelete(id){
  const g=getGoal(id);if(!g)return;
  if(confirm('Delete "'+g.title+'"? Any XP it gave will be removed from your stats.')){deleteGoal(id);}
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Page nav ──────────────────────────────────────────────────────────────
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const nb=document.getElementById('nav-'+name);if(nb)nb.classList.add('active');
  window.scrollTo({top:0});
  if(name==='progress')renderProgress();
  if(name==='gym')renderGymLog();
  if(name==='goals')renderGoals();
  if(name==='stats')renderStats();
  if(name==='nutrition')renderNutrition();
}

// ── Nutrition page (full plan reference) ───────────────────────────────────
function renderNutrition(){
  const meals=[
    ['Breakfast','4-egg omelette + veg','~26g P'],
    ['Skin bowl','Greek yogurt + banana + berries + nuts + chia','~23g P'],
    ['Lunch','180g chicken + rice + veg','~56g P'],
    ['Dinner','150g salmon / turkey + potato or rice + veg','~35g P']
  ];
  let h='';
  h+='<div class="nutri-plan-card"><div class="nutri-plan-title">Daily targets</div>'
    +'<div class="nutri-target-grid">'
    +'<div class="ntg-col"><div class="ntg-head" style="color:var(--green)">Training day</div><div class="ntg-big">2,300</div><div class="ntg-sub">kcal · 135g P · 250g C · 60g F</div></div>'
    +'<div class="ntg-col"><div class="ntg-head" style="color:var(--blue)">Rest day</div><div class="ntg-big">2,000</div><div class="ntg-sub">kcal · 135g P · 200g C · 60g F</div></div>'
    +'</div>'
    +'<div class="nutri-plan-note"><b>Protein 135g is the number to hit every day.</b> Carbs and fat can flex. Never drop below ~2,100 on a base day — you\u2019re still growing, so if you\u2019re drained or strength stalls, eat more, not less.</div></div>';

  h+='<div class="nutri-plan-card"><div class="nutri-plan-title">Base meal plan</div>';
  meals.forEach(function(m){
    h+='<div class="nutri-meal"><div class="nutri-meal-head"><span class="nutri-meal-name">'+m[0]+'</span><span class="nutri-meal-p">'+m[2]+'</span></div><div class="nutri-meal-food">'+m[1]+'</div></div>';
  });
  h+='<div class="nutri-plan-note">Lands ~140g protein across the day. If not cooking, ask for a palm-to-hand-sized protein at each meal + veg. Add fruit + milk or extra yogurt to top up to target.</div></div>';

  h+='<div class="nutri-plan-card"><div class="nutri-plan-title">The dials</div>'
    +'<div class="nutri-dial"><b>Rice</b> — your main calorie dial. 1.5 cups on training days, ~1 cup on rest. 1 cup ≈ 200 kcal / 45g carb.</div>'
    +'<div class="nutri-dial"><b>Oil</b> — even clean oil is ~120 kcal a tbsp and hides in cooking. Easiest place to overshoot without noticing.</div>'
    +'<div class="nutri-dial"><b>Water</b> — 2–2.5 L a day, more on training days.</div></div>';

  h+='<div class="nutri-plan-card"><div class="nutri-plan-title">Guardrails</div>'
    +'<div class="nutri-guard">Recomp is slow by design — the scale barely moves while you lean out and get stronger. Trust the photos, tape and lifts over the scale.</div>'
    +'<div class="nutri-guard">If growth, strength, mood or sleep dip, bump to maintenance for a week or two. There is no rush.</div>'
    +'<div class="nutri-guard">Protein + enough total food protect your muscle. Never trade those for a faster number on the scale.</div></div>';

  h+='<div class="nutri-plan-card"><div class="nutri-plan-title">Supplements</div>'
    +'<div class="nutri-dial"><b>Multivitamin + Vitamin D</b> — reasonable, especially Vit D in a UK winter. Already a habit.</div>'
    +'<div class="nutri-dial"><b>Creatine (3–5g/day)</b> — optional, the most researched safe performance supplement. No loading needed.</div>'
    +'<div class="nutri-dial"><b>Ashwagandha</b> — hold off / check with a doctor first. Most research is in adults; sleep + daylight + de-stress do the same job with none of the unknowns.</div></div>';
  h+='<div style="height:8px"></div>';
  document.getElementById('nutritionContent').innerHTML=h;
}

// ── Init ──────────────────────────────────────────────────────────────────
load();curDay=todayIdx();renderTracker();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
